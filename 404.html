<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piatto non trovato - BistroBò</title>
  
  <!-- ATTENZIONE: I percorsi DEVONO iniziare con /BistroBo-App/ per funzionare nella 404 -->
  <link rel="icon" href="/BistroBo-App/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/BistroBo-App/main/style.css" />
  
  <style>
    /* Centratura e stile personalizzato per l'errore */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }
    .error-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 50px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 500px;
      width: 90%;
      z-index: 10;
    }
    
    /* Adattamento automatico ai tuoi temi scuri */
    body.tema-notte .error-container,
    body.tema-astronave .error-container {
      background: #050A13;
      border: 1px solid #00A6CC;
      color: #fff;
    }

    .error-container h1 {
      font-size: 6rem;
      margin: 0;
      color: #FF5722;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    .error-container h2 {
      font-size: 2rem;
      margin-top: 10px;
      color: inherit;
    }
    .error-container p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #555;
    }
    
    body.tema-notte .error-container p,
    body.tema-astronave .error-container p {
      color: #ccc;
    }

    .home-btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .home-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <!-- Lo sfondo dei tuoi temi -->
  <div id="themeBackground"></div>
  
  <div class="error-container">
    <h1>404</h1>
    <h2>Piatto non trovato! 🍽️</h2>
    <p>Sembra che la pagina che stai cercando sia finita fuori dal menù o non sia mai esistita.</p>
    
    <!-- Percorso assoluto per tornare SEMPRE alla home giusta -->
    <a href="/BistroBo-App/index.html" class="home-btn">🔙 Torna alla Cassa</a>
  </div>

  <!-- SCRIPT FIREBASE PER IL TEMA BISTROBÒ -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
      authDomain: "comande-6fb85.firebaseapp.com",
      databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "comande-6fb85"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Applica in tempo reale il tema del BistroBò
    db.ref("impostazioni/tema").on("value", snap => {
      const tema = snap.val() || "default";
      document.body.className = ""; // pulizia classi
      document.body.classList.add("tema-" + tema, "tema-caricato");
    });
  </script>
</body>
</html>
