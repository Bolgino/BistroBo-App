<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="main/style.css">
    
    <style>
        /* Scudo anti-invisibilità per evitare che la pagina sia nascosta */
        html, body { opacity: 1 !important; visibility: visible !important; display: block !important; }
        #loader { display: none; } /* Lo nascondiamo finché non serve */

        .cliente-container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .box-centrato { background: var(--bg-element, #fff); padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border-color, #eee); }
        .row-piatto { display: flex; justify-content: space-between; font-size: 1.5em; padding: 15px 0; border-bottom: 1px dashed var(--border-color, #ccc); color: var(--text-color, #000); }
        .totali-grid { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 15px; }
        .valore-testo { font-size: 2em; font-weight: bold; }
    </style>
</head>
<body class="light-mode" data-theme="light">

    <div class="topBar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="icon-192.png" alt="Logo" style="width: 40px;">
            <h1 style="margin: 0; font-size: 1.5em; color: var(--text-color, #000);">BistroBò - <span id="numComandaDisplay">Display</span></h1>
        </div>
        <button id="logoutBtn" onclick="eseguiLogout()" style="padding: 10px 20px; cursor: pointer; display: none;">Esci</button>
    </div>

    <div class="cliente-container">
        
        <div id="loginDiv" class="box-centrato">
            <h2 style="text-align: center; color: var(--text-color, #000);">Accesso Display</h2>
            <input type="email" id="loginEmail" placeholder="cliente@bistrobo.it" style="width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 5px; border: 1px solid var(--border-color, #ccc); background: var(--bg-color, #fff); color: var(--text-color, #000); box-sizing: border-box;">
            <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 5px; border: 1px solid var(--border-color, #ccc); background: var(--bg-color, #fff); color: var(--text-color, #000); box-sizing: border-box;">
            <button onclick="eseguiLogin()" style="width: 100%; padding: 15px; font-size: 1.2em; font-weight: bold; background: var(--primary-color, #d32f2f); color: white; border: none; border-radius: 5px; cursor: pointer;">ACCEDI</button>
        </div>

        <div id="cassaDiv" class="box-centrato" style="display: none;">
            <h2 style="text-align: center; color: var(--text-color, #000);">Scegli Cassa</h2>
            <select id="selectCassa" style="width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 5px; border: 1px solid var(--border-color, #ccc); background: var(--bg-color, #fff); color: var(--text-color, #000); box-sizing: border-box;"></select>
            <button onclick="avviaDisplay()" style="width: 100%; padding: 15px; font-size: 1.2em; font-weight: bold; background: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer;">COLLEGA</button>
        </div>

        <div id="displayScreen" style="display: none;">
            <div class="box-centrato" style="min-height: 300px;" id="listaPiatti">
                <div style="text-align:center; margin-top:100px; font-size: 1.5em; opacity:0.5; color: var(--text-color, #000);">In attesa di articoli...</div>
            </div>

            <div class="totali-grid">
                <div class="box-centrato" style="text-align: center; margin: 0; padding: 20px;">
                    <div style="font-size: 1.2em; opacity: 0.8; color: var(--text-color, #000);">Pagato</div>
                    <div class="valore-testo" style="color: #2196f3;" id="pagato">€ 0.00</div>
                </div>
                <div class="box-centrato" style="text-align: center; margin: 0; padding: 20px;">
                    <div style="font-size: 1.2em; opacity: 0.8; color: var(--text-color, #000);">Resto</div>
                    <div class="valore-testo" style="color: #4caf50;" id="resto">€ 0.00</div>
                </div>
                <div class="box-centrato" style="text-align: right; margin: 0; padding: 20px; border: 2px solid var(--primary-color, #d32f2f);">
                    <div style="font-size: 1.5em; font-weight: bold; color: var(--primary-color, #d32f2f);">TOTALE</div>
                    <div style="font-size: 3em; color: var(--primary-color, #d32f2f); font-weight: bold; line-height: 1;" id="totale">€ 0.00</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // SCARICA TUTTO IL NODO IMPOSTAZIONI COME IL SITO PRINCIPALE
        db.ref("impostazioni").on("value", snap => {
            const imp = snap.val();
            if(!imp) return;
            
            // Applica il tema
            if(imp.tema) {
                document.documentElement.setAttribute('data-theme', imp.tema);
                document.body.className = imp.tema === "dark" ? "dark-mode" : "light-mode";
            }
            
            // Se nel database ci sono colori CSS personalizzati (es. imp.colori.primary) li inietta
            if(imp.colori) {
                for(let colore in imp.colori) {
                    document.documentElement.style.setProperty(`--${colore}`, imp.colori[colore]);
                }
            }
        });

        // Imposta la persistenza a SESSION (quando si chiude il browser si slogga)
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION).then(() => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById("logoutBtn").style.display = "block";
                    caricaCasse();
                } else {
                    document.getElementById("logoutBtn").style.display = "none";
                    mostraSezione("loginDiv");
                }
            });
        });

        function eseguiLogin() {
            const e = document.getElementById("loginEmail").value.trim().toLowerCase();
            const p = document.getElementById("loginPassword").value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Errore login!"));
        }

        function eseguiLogout() {
            auth.signOut().then(() => window.location.reload());
        }

        function mostraSezione(id) {
            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("cassaDiv").style.display = "none";
            document.getElementById("displayScreen").style.display = "none";
            document.getElementById(id).style.display = "block";
        }

        function caricaCasse() {
            mostraSezione("cassaDiv");
            db.ref("utenti").once("value", snap => {
                const select = document.getElementById("selectCassa");
                select.innerHTML = '<option value="">-- Seleziona --</option>';
                snap.forEach(s => {
                    const u = s.val();
                    if(u.ruolo === 'cassa' || u.ruolo === 'admin') {
                        const opt = document.createElement("option");
                        opt.value = s.key; opt.textContent = u.username;
                        select.appendChild(opt);
                    }
                });
            });
        }

        function avviaDisplay() {
            const cassaUid = document.getElementById("selectCassa").value;
            if(!cassaUid) return alert("Scegli una cassa!");
            
            mostraSezione("displayScreen");
            
            db.ref("displayLive/" + cassaUid).on("value", snap => {
                const data = snap.val();
                
                // Se la cassa invia vuoto (es. dopo l'invio della comanda)
                if(!data || !data.piatti || data.piatti.length === 0) {
                    document.getElementById("numComandaDisplay").innerText = "Pronto";
                    document.getElementById("totale").innerText = "€ 0.00";
                    document.getElementById("pagato").innerText = "€ 0.00";
                    document.getElementById("resto").innerText = "€ 0.00";
                    document.getElementById("listaPiatti").innerHTML = '<div style="text-align:center; margin-top:100px; font-size: 1.5em; opacity:0.5; color: var(--text-color, #000);">In attesa di articoli...</div>';
                    return;
                }
                
                document.getElementById("numComandaDisplay").innerText = "#" + (data.numeroComanda || "---");
                document.getElementById("totale").innerText = "€ " + (data.totale || 0).toFixed(2);
                document.getElementById("pagato").innerText = "€ " + (data.pagato || 0).toFixed(2);
                document.getElementById("resto").innerText = "€ " + (data.resto || 0).toFixed(2);
                
                document.getElementById("listaPiatti").innerHTML = data.piatti.map(p => `
                    <div class="row-piatto">
                        <span><b style="color:var(--primary-color, #d32f2f);">${p.quantita}x</b> &nbsp; ${p.nome}</span>
                        <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                    </div>
                `).join("");
            });
        }
    </script>
</body>
</html>
