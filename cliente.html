<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="main/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        /* Struttura specifica e override per estetica moderna */
        body { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            padding: 0;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }
        body.tema-caricato { display: flex; }
        
        /* Layout Monitor */
        .monitor-layout { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            padding: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
            width: 100%; 
            box-sizing: border-box; 
        }

        /* Liste e Righe */
        .lista-piatti-scroll { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            border: 1px solid rgba(255,255,255,0.3);
        }
        .riga-ordine { 
            display: flex; 
            justify-content: space-between; 
            font-size: 2.2em; 
            padding: 18px 0; 
            border-bottom: 1px dashed rgba(0,0,0,0.1); 
            font-weight: 500;
        }
        
        .footer-monitor { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        .valore-tot { font-size: 3.8em; font-weight: 800; line-height: 1; color: #2e7d32; }
        
        /* Box Styling (Overriding default per coerenza) */
        .box-cliente { 
            background: rgba(255, 255, 255, 0.92); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            backdrop-filter: blur(10px);
        }

        /* Top Bar */
        .topBar-cliente { 
            background: rgba(255,255,255,0.85); 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Centratura Schermate Accesso */
        .center-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* Form styling */
        .input-cliente {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border-radius: 12px;
            border: 2px solid #eee;
            font-size: 1.1em;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .input-cliente:focus { border-color: #2196f3; outline: none; }
        
        .btn-cliente {
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .notification { padding: 15px 25px; border-radius: 12px; color: white; font-weight: bold; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="themeBackground"></div>
    <div id="notification-container"></div>

    <div class="topBar-cliente">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="icon-192.png" alt="Logo" style="width: 50px;">
            <h1 style="margin: 0; font-size: 1.8em; color: #333; text-align: left;">BistroBò <span id="labelCassa" style="opacity: 0.5; font-size: 0.6em; font-weight: 400;"></span></h1>
        </div>
        <div style="display: flex; gap: 15px;">
            <button class="tabBtn" onclick="cambiaCassa()" id="btnSwitch" style="display:none; background: #eee;">Cambia Cassa</button>
            <button class="tabBtn" onclick="eseguiLogout()" id="btnLogout" style="display:none; background: #f44336; color: white;">Esci</button>
        </div>
    </div>

    <div class="monitor-layout">
        <div id="loginDiv" class="center-screen" style="display:none;">
            <div class="box-cliente" style="width: 450px; text-align: center;">
                <h2 style="margin-top:0; font-weight: 800;">Accesso Display</h2>
                <p style="opacity: 0.6;">Inserisci le credenziali del profilo cliente</p>
                <input type="email" id="email" class="input-cliente" placeholder="cliente@bistrobo.it">
                <input type="password" id="pass" class="input-cliente" placeholder="Password">
                <button class="btn-cliente" onclick="login()" style="background: #2196f3; color: white;">Entra nel Sistema</button>
            </div>
        </div>

        <div id="cassaDiv" class="center-screen" style="display:none;">
            <div class="box-cliente" style="width: 450px; text-align: center;">
                <h2 style="margin-top:0; font-weight: 800;">Configura Display</h2>
                <p>A quale postazione cassa vuoi collegarti?</p>
                <select id="selectCassa" class="input-cliente"></select>
                <button class="btn-cliente" onclick="connettiCassa()" style="background: #4caf50; color: white;">Attiva Proiezione</button>
            </div>
        </div>

        <div id="displayScreen" style="display:none; flex-direction: column; gap: 25px; flex: 1;">
            <div id="areaLista" class="box-cliente lista-piatti-scroll">
                <div style="text-align:center; margin-top:120px; opacity:0.2; font-size: 2.5em; font-weight: 700;">IN ATTESA DI ARTICOLI...</div>
            </div>

            <div class="footer-monitor">
                <div class="box-cliente" style="text-align: center; padding: 15px;">
                    <div style="opacity:0.5; text-transform:uppercase; font-size: 0.9em; font-weight: 700; letter-spacing: 1px;">Pagato</div>
                    <div style="color: #2196f3; font-size: 2.8em; font-weight: 800;" id="vPagato">€ 0.00</div>
                </div>
                <div class="box-cliente" style="text-align: center; padding: 15px;">
                    <div style="opacity:0.5; text-transform:uppercase; font-size: 0.9em; font-weight: 700; letter-spacing: 1px;">Resto</div>
                    <div style="color: #ff9800; font-size: 2.8em; font-weight: 800;" id="vResto">€ 0.00</div>
                </div>
                <div class="box-cliente" style="text-align: right; border-bottom: 8px solid #2e7d32;">
                    <div style="color: #2e7d32; font-weight:800; text-transform:uppercase; font-size: 1em; letter-spacing: 1px;">Totale Ordine</div>
                    <div class="valore-tot" id="vTotale">€ 0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function notify(msg, type = 'info') {
            const container = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = `notification`;
            n.style.background = type === 'error' ? '#f44336' : type === 'warn' ? '#ff9800' : '#2196f3';
            n.innerText = msg;
            container.appendChild(n);
            setTimeout(() => { n.style.opacity = '0'; setTimeout(() => n.remove(), 500); }, 3500);
        }

        // --- TEMA REALTIME (Index Style) ---
        db.ref("impostazioni/tema").on("value", snap => {
            const tema = snap.val() || "default";
            document.body.classList.remove("tema-default","tema-scout","tema-inverno","tema-autunno","tema-primavera","tema-estate");
            document.body.classList.add("tema-" + tema);
            document.body.classList.add("tema-caricato");
        });

        auth.onAuthStateChanged(user => {
            if (user && user.email === "cliente@bistrobo.it") {
                document.getElementById("btnLogout").style.display = "block";
                const cassaSalvata = localStorage.getItem("cassaMonitorata");
                if (cassaSalvata) {
                    avviaMonitor(cassaSalvata);
                } else {
                    mostraSezione("cassaDiv");
                    caricaElencoCasse();
                }
            } else {
                if(user) auth.signOut();
                mostraSezione("loginDiv");
            }
        });

        function login() {
            const e = document.getElementById("email").value.trim();
            const p = document.getElementById("pass").value;
            if(!e || !p) return notify("Inserisci email e password", "warn");
            auth.signInWithEmailAndPassword(e, p).catch(() => notify("Credenziali errate", "error"));
        }

        function caricaElencoCasse() {
            db.ref("utenti").once("value", snap => {
                const sel = document.getElementById("selectCassa");
                sel.innerHTML = '<option value="">-- Seleziona Cassa --</option>';
                snap.forEach(u => {
                    const d = u.val();
                    if((d.ruolo === 'cassa' || d.ruolo === 'admin') && d.approvato) {
                        let opt = document.createElement("option");
                        opt.value = u.key; opt.textContent = d.username;
                        sel.appendChild(opt);
                    }
                });
            });
        }

        function connettiCassa() {
            const uid = document.getElementById("selectCassa").value;
            if(!uid) return notify("Seleziona una cassa!", "warn");
            localStorage.setItem("cassaMonitorata", uid);
            avviaMonitor(uid);
        }

        function avviaMonitor(uidCassa) {
            mostraSezione("displayScreen");
            document.getElementById("btnSwitch").style.display = "block";
            
            // 1. Dati Live Ordine
            db.ref("displayLive/" + uidCassa).on("value", snap => {
                const data = snap.val();
                if(!data || !data.piatti || data.piatti.length === 0) {
                    resetGrafica();
                    return;
                }
                document.getElementById("labelCassa").innerText = "(Collegato)";
                document.getElementById("vTotale").innerText = "€ " + data.totale.toFixed(2);
                document.getElementById("vPagato").innerText = "€ " + (data.pagato || 0).toFixed(2);
                document.getElementById("vResto").innerText = "€ " + (data.resto || 0).toFixed(2);
                document.getElementById("areaLista").innerHTML = data.piatti.map(p => `
                    <div class="riga-ordine">
                        <span><b style="color:#2196f3; font-weight: 800;">${p.quantita}x</b> &nbsp; ${p.nome}</span>
                        <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                    </div>
                `).join("");
            });

            // 2. Scollegamento se cassiere va offline
            db.ref("utenti/" + uidCassa + "/status/state").on("value", stateSnap => {
                if (stateSnap.val() === "offline") {
                    notify("Il cassiere si è disconnesso. Connessione interrotta.", "warn");
                    interrompiMonitoraggio(uidCassa);
                }
            });
        }

        function interrompiMonitoraggio(uidCassa) {
            db.ref("displayLive/" + uidCassa).off();
            db.ref("utenti/" + uidCassa + "/status/state").off();
            localStorage.removeItem("cassaMonitorata");
            resetGrafica();
            document.getElementById("btnSwitch").style.display = "none";
            document.getElementById("labelCassa").innerText = "";
            mostraSezione("cassaDiv");
            caricaElencoCasse();
        }

        function cambiaCassa() {
            const uid = localStorage.getItem("cassaMonitorata");
            if(uid) interrompiMonitoraggio(uid);
        }

        function resetGrafica() {
            document.getElementById("vTotale").innerText = "€ 0.00";
            document.getElementById("vPagato").innerText = "€ 0.00";
            document.getElementById("vResto").innerText = "€ 0.00";
            document.getElementById("areaLista").innerHTML = '<div style="text-align:center; margin-top:120px; opacity:0.2; font-size: 2.5em; font-weight: 700;">IN ATTESA DI ARTICOLI...</div>';
        }

        function mostraSezione(id) {
            ["loginDiv", "cassaDiv", "displayScreen"].forEach(d => document.getElementById(d).style.display = "none");
            const target = document.getElementById(id);
            if(id === "displayScreen") target.style.display = "flex";
            else target.style.display = "flex"; // center-screen usa flex
        }

        function eseguiLogout() {
            const uid = localStorage.getItem("cassaMonitorata");
            if(uid) interrompiMonitoraggio(uid);
            auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>
