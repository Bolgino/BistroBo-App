<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="main/style.css">
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        .header { background: #d32f2f; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .main-content { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; }
        .order-list { flex: 2; background: #2a2a2a; border-radius: 15px; padding: 20px; overflow-y: auto; border: 1px solid #444; }
        .totals-area { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #333; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #444; }
        .piatto-item { display: flex; justify-content: space-between; font-size: 1.8em; padding: 15px 0; border-bottom: 1px solid #444; }
        .total-val { font-size: 4em; font-weight: bold; color: #ffeb3b; }
        .resto-val { font-size: 2.5em; color: #4caf50; }
        .setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .setup-box { background: white; color: black; padding: 40px; border-radius: 15px; text-align: center; width: 400px; }
        select, input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #d32f2f; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="setupOverlay" class="setup-overlay">
        <div class="setup-box">
            <h2 id="setupTitle">Accesso Display Cliente</h2>
            <div id="loginSection">
                <input type="email" id="email" placeholder="cliente@bistrobo.it">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="login()">Accedi</button>
            </div>
            <div id="cassaSection" style="display:none;">
                <p>Seleziona la Cassa da seguire:</p>
                <select id="selectCassa"></select>
                <button onclick="avviaDisplay()">Avvia Schermo</button>
            </div>
        </div>
    </div>

    <div class="header">
        <h1 style="margin:0; font-size: 2.5em;">BISTROBÒ - ORDINE <span id="numComanda">---</span></h1>
    </div>

    <div class="main-content">
        <div class="order-list" id="listaPiatti">
            <div style="text-align:center; margin-top:100px; font-size: 2em; color: #666;">In attesa del primo piatto...</div>
        </div>
        <div class="totals-area">
            <div class="card">
                <div style="font-size: 1.5em; text-transform: uppercase; color: #bbb;">Totale</div>
                <div class="total-val" id="totale">€ 0.00</div>
            </div>
            <div class="card">
                <div style="font-size: 1.2em; text-transform: uppercase; color: #bbb;">Resto</div>
                <div class="resto-val" id="resto">€ 0.00</div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE FIREBASE (Dalla tua script.js)
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        function login() {
            const e = document.getElementById("email").value;
            const p = document.getElementById("pass").value;
            auth.signInWithEmailAndPassword(e, p).then(() => {
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("cassaSection").style.display = "block";
                document.getElementById("setupTitle").innerText = "Configurazione Canale";
                caricaCasse();
            }).catch(err => alert("Errore: " + err.message));
        }

        function caricaCasse() {
            db.ref("utenti").once("value", snap => {
                const select = document.getElementById("selectCassa");
                snap.forEach(s => {
                    const u = s.val();
                    if(u.ruolo === 'cassa' || u.ruolo === 'admin') {
                        const opt = document.createElement("option");
                        opt.value = s.key;
                        opt.textContent = u.username;
                        select.appendChild(opt);
                    }
                });
            });
        }

        function avviaDisplay() {
            const cassaUid = document.getElementById("selectCassa").value;
            if(!cassaUid) return;
            document.getElementById("setupOverlay").style.display = "none";
            
            db.ref("displayLive/" + cassaUid).on("value", snap => {
                const data = snap.val() || { piatti: [], totale: 0, numeroComanda: "---", resto: 0 };
                
                document.getElementById("numComanda").innerText = data.numeroComanda;
                document.getElementById("totale").innerText = "€ " + data.totale.toFixed(2);
                document.getElementById("resto").innerText = "€ " + (data.resto || 0).toFixed(2);
                
                const container = document.getElementById("listaPiatti");
                if(data.piatti.length === 0) {
                    container.innerHTML = '<div style="text-align:center; margin-top:100px; font-size: 2em; color: #666;">In attesa...</div>';
                    return;
                }
                
                container.innerHTML = data.piatti.map(p => `
                    <div class="piatto-item">
                        <span><strong>${p.quantita}x</strong> ${p.nome}</span>
                        <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                    </div>
                `).join("");
            });
        }
    </script>
</body>
</html>
