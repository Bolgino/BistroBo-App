<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="main/style.css">
    
    <style>
        /* NESSUN BACKGROUND FORZATO. Lasciamo che style.css metta i gradienti! */
        .cliente-wrapper { max-width: 900px; margin: 30px auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .riga-ordine { display: flex; justify-content: space-between; font-size: 1.8em; padding: 15px 0; border-bottom: 1px dashed var(--border-color); }
        .riga-ordine:last-child { border-bottom: none; }
        
        .griglia-totali { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 15px; }
        .valore-gigante { font-size: 3em; font-weight: bold; margin-top: 10px; }
        
        .input-display { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 1.1em; box-sizing: border-box; }
        .btn-display { width: 100%; padding: 15px; font-weight: bold; font-size: 1.2em; background: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; transition: filter 0.2s; }
        .btn-display:hover { filter: brightness(0.9); }
        
        /* Nasconde il loader default del tuo style.css in attesa del tema */
        #loader { display: none !important; }
    </style>
</head>
<body> <div class="topBar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; position: relative; z-index: 999;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="icon-192.png" alt="Logo" class="logo" style="width: 40px; height: 40px; margin: 0;">
            <h2 style="margin: 0; color: var(--text-color);">Display <span id="numComandaDisplay" style="color: var(--primary-color);"></span></h2>
        </div>
        <button id="logoutBtn" onclick="auth.signOut().then(() => location.reload())" style="display: none; background: transparent; border: 1px solid var(--text-color); color: var(--text-color); padding: 8px 15px; border-radius: 5px; cursor: pointer;">Esci</button>
    </div>

    <div class="cliente-wrapper">
        
        <div id="loginDiv" class="box" style="display: none; max-width: 400px; margin: 40px auto; text-align: center; width: 100%;">
            <h2 style="margin-top:0;">Accesso Display</h2>
            <input type="email" id="loginEmail" class="input-display" placeholder="cliente@bistrobo.it">
            <input type="password" id="loginPassword" class="input-display" placeholder="Password">
            <button onclick="eseguiLogin()" class="btn-display">ACCEDI AL MONITOR</button>
        </div>

        <div id="cassaDiv" class="box" style="display: none; max-width: 400px; margin: 40px auto; text-align: center; width: 100%;">
            <h2 style="margin-top:0;">Configura Display</h2>
            <p style="opacity: 0.8; margin-bottom: 20px;">Quale dispositivo devi seguire?</p>
            <select id="selectCassa" class="input-display"></select>
            <button onclick="avviaDisplay()" class="btn-display" style="background: #4caf50;">CONNETTI</button>
        </div>

        <div id="displayScreen" style="display: none; flex-direction: column; gap: 20px;">
            
            <div class="box" id="listaPiatti" style="min-height: 300px; overflow-y: auto;">
                <div style="text-align:center; margin-top:100px; opacity:0.5; font-size: 1.5em;">In attesa di articoli...</div>
            </div>

            <div class="griglia-totali">
                <div class="box" style="text-align: center;">
                    <div style="text-transform: uppercase; font-weight: bold; opacity: 0.8;">Pagato</div>
                    <div class="valore-gigante" style="color: #4fc3f7;" id="pagato">€ 0.00</div>
                </div>
                <div class="box" style="text-align: center;">
                    <div style="text-transform: uppercase; font-weight: bold; opacity: 0.8;">Resto</div>
                    <div class="valore-gigante" style="color: #81c784;" id="resto">€ 0.00</div>
                </div>
                <div class="box" style="text-align: right; border: 2px solid var(--primary-color);">
                    <div style="text-transform: uppercase; font-weight: bold; color: var(--primary-color);">Totale Dovuto</div>
                    <div class="valore-gigante" id="totale">€ 0.00</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // 1. GESTIONE TEMA (Sblocca il CSS di BistroBò)
        db.ref("impostazioni/tema").on("value", snap => {
            const tema = snap.val() || "default";

            document.body.classList.remove(
                "tema-default", "tema-scout", "tema-inverno",
                "tema-autunno", "tema-primavera", "tema-estate"
            );
            document.body.classList.add("tema-" + tema);
            document.documentElement.setAttribute('data-theme', tema);

            // Questo è il segreto: sblocca lo schermo e carica il gradiente!
            document.body.classList.add("tema-caricato");
        });

        // Applica i colori custom se presenti
        db.ref("impostazioni/colori").on("value", snap => {
            const col = snap.val();
            if(col) {
                const root = document.documentElement;
                for(let key in col) root.style.setProperty(`--${key}`, col[key]);
            }
        });

        // 2. GESTIONE ACCESSO E VISTE
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        
        auth.onAuthStateChanged(user => {
            if (user && user.email === "cliente@bistrobo.it") {
                document.getElementById("logoutBtn").style.display = "block";
                caricaCasse();
            } else {
                if(user) auth.signOut();
                document.getElementById("logoutBtn").style.display = "none";
                mostraSezione("loginDiv");
            }
        });

        function eseguiLogin() {
            const e = document.getElementById("loginEmail").value.trim().toLowerCase();
            const p = document.getElementById("loginPassword").value;
            
            if (e !== "cliente@bistrobo.it") return alert("Accesso riservato all'account Display Cliente.");
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Errore login: Controlla la password."));
        }

        function mostraSezione(id) {
            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("cassaDiv").style.display = "none";
            document.getElementById("displayScreen").style.display = "none";
            document.getElementById(id).style.display = (id === "displayScreen") ? "flex" : "block";
        }

        // 3. SINCRONIZZAZIONE RICEZIONE LIVE
        function caricaCasse() {
            mostraSezione("cassaDiv");
            db.ref("utenti").once("value", snap => {
                const sel = document.getElementById("selectCassa");
                sel.innerHTML = '<option value="">-- Seleziona Dispositivo --</option>';
                snap.forEach(s => {
                    const u = s.val();
                    if(u.ruolo === 'cassa' || u.ruolo === 'admin') {
                        let opt = document.createElement("option");
                        opt.value = s.key; opt.textContent = u.username || u.email;
                        sel.appendChild(opt);
                    }
                });
            });
        }

        function avviaDisplay() {
            const uidCassa = document.getElementById("selectCassa").value;
            if(!uidCassa) return alert("Scegli una cassa dall'elenco!");
            
            mostraSezione("displayScreen");
            
            db.ref("displayLive/" + uidCassa).on("value", snap => {
                const data = snap.val();
                
                if(!data || !data.piatti || data.piatti.length === 0) {
                    document.getElementById("numComandaDisplay").innerText = "";
                    document.getElementById("totale").innerText = "€ 0.00";
                    document.getElementById("pagato").innerText = "€ 0.00";
                    document.getElementById("resto").innerText = "€ 0.00";
                    document.getElementById("listaPiatti").innerHTML = '<div style="text-align:center; margin-top:100px; opacity:0.5; font-size: 1.5em;">Pronto per il prossimo ordine!</div>';
                    return;
                }
                
                document.getElementById("numComandaDisplay").innerText = "- #" + (data.numeroComanda || "---");
                document.getElementById("totale").innerText = "€ " + (data.totale || 0).toFixed(2);
                document.getElementById("pagato").innerText = "€ " + (data.pagato || 0).toFixed(2);
                document.getElementById("resto").innerText = "€ " + (data.resto || 0).toFixed(2);
                
                document.getElementById("listaPiatti").innerHTML = data.piatti.map(p => `
                    <div class="riga-ordine">
                        <span><b style="color:var(--primary-color);">${p.quantita}x</b> &nbsp; <span>${p.nome}</span></span>
                        <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                    </div>
                `).join("");
            });
        }
    </script>
</body>
</html>
