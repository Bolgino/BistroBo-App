<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="main/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            padding: 0;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }
        body.tema-caricato { display: flex; }
        
        .monitor-layout { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            padding: 10px 30px 30px 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
            width: 100%; 
            box-sizing: border-box;
            min-height: 0;
        }

        .topBar-cliente { 
            background: transparent; 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: none;
            flex-shrink: 0;
        }
        .topBar-cliente h1 {
            margin: 0; 
            font-size: 2.2em; 
            text-align: left;
            color: inherit;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }

        .lista-piatti-scroll { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            min-height: 0; 
        }

        .lista-piatti-scroll::-webkit-scrollbar { width: 12px; }
        .lista-piatti-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .lista-piatti-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.3); border-radius: 10px; border: 3px solid rgba(255,255,255,0.9); background-clip: content-box; }

        .riga-ordine { 
            display: flex; 
            flex-direction: column;
            font-size: 1.1em; 
            padding: 18px 0; 
            border-bottom: 1px dashed rgba(0,0,0,0.1); 
        }
        
        .footer-monitor { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1.5fr; 
            gap: 20px; 
            flex-shrink: 0; 
        }
        
        .center-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 75vh;
            text-align: center;
        }
        .access-content { width: 100%; max-width: 450px; }
        .input-access {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.8);
            font-size: 1.1em;
            box-sizing: border-box;
        }

        .toast.persistent {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
    </style>
</head>
<body>
    <div id="themeBackground"></div>
    <div id="notification-container"></div>

    <div class="topBar-cliente">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="icon-192.png" alt="Logo" style="width: 55px;">
            <h1>BistroBò <span id="labelCassa" style="opacity: 0.6; font-size: 0.5em; font-weight: 400;"></span></h1>
        </div>
        <div style="display: flex; gap: 15px;">
            <button onclick="cambiaCassa()" id="btnSwitch" style="display:none; padding:10px 15px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;">Cambia Cassa</button>
            <button onclick="eseguiLogout()" id="btnLogout" style="display:none; padding:10px 15px; border-radius:10px; border:none; background:#f44336; color:white; font-weight:bold; cursor:pointer;">Esci</button>
        </div>
    </div>

    <div class="monitor-layout">
        <div id="disabledDiv" class="center-screen" style="display:none;">
            <div class="access-content" style="color: #f44336;">
                <h2 style="font-size:2.5em; font-weight:800;">Scheda Clienti Disabilitata</h2>
                <p style="color: #333; font-weight: 600;">per attivarla contattare l'amministratore</p>
            </div>
        </div>

        <div id="loginDiv" class="center-screen" style="display:none;">
            <div class="access-content">
                <h2 style="font-size:2.5em; font-weight:800;">Accesso Monitor</h2>
                <p>Inserisci le credenziali autorizzate</p>
                <input type="email" id="email" class="input-access" placeholder="Email">
                <input type="password" id="pass" class="input-access" placeholder="Password">
                <button onclick="login()" style="width: 100%; padding: 20px; font-size: 1.2em; border-radius: 15px; background: #4CAF50; color: white; border: none; font-weight: bold; cursor: pointer;">ACCEDI AL SISTEMA</button>
            </div>
        </div>

        <div id="cassaDiv" class="center-screen" style="display:none;">
            <div class="access-content">
                <h2 style="font-size:2.5em; font-weight:800;">Configura Monitor</h2>
                <p>Seleziona una postazione attiva (online):</p>
                <select id="selectCassa" class="input-access" style="cursor: pointer;"></select>
                <button onclick="connettiCassa()" style="width: 100%; padding: 20px; font-size: 1.2em; border-radius: 15px; background: #2196F3; color: white; border: none; font-weight: bold; cursor: pointer;">AVVIA PROIEZIONE</button>
            </div>
        </div>

        <div id="displayScreen" style="display:none; flex-direction: column; gap: 20px; flex: 1; min-height: 0;">
            <div id="areaLista" class="lista-piatti-scroll">
                <div style="text-align:center; margin-top:150px; opacity:0.15; font-size: 2.5em; font-weight: 800;">IN ATTESA DI ARTICOLI...</div>
            </div>

            <div id="footerMonitorCliente" class="footer-monitor">
    
                <div id="boxPagatoCliente" style="background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                    <div style="opacity:0.6; font-weight: 800;">PAGATO</div>
                    <div style="color: #2196f3; font-size: 3em; font-weight: 900;" id="vPagato">€ 0.00</div>
                </div>
                
                <div id="boxRestoCliente" style="background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                    <div style="opacity:0.6; font-weight: 800;">RESTO</div>
                    <div style="color: #ff9800; font-size: 3em; font-weight: 900;" id="vResto">€ 0.00</div>
                </div>
                
                <div id="boxTotaleCliente" style="text-align: right; border-bottom: 8px solid #333; padding: 15px; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center;">
                    <div style="opacity:0.8; font-weight:900;">TOTALE ORDINE</div>
                    <div style="font-size: 4em; font-weight: 800; line-height: 1;" id="vTotale">€ 0.00</div>
                </div>
            
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let monitorAbilitato = true;
        let onlineKnown = new Set();
        let isFirstLoadCasse = true;
        let utentiListener = null;

        function notify(msg, type = 'info') {
            const container = document.getElementById('notification-container');
            const n = document.createElement('div');
            n.className = `toast ${type}`;
            n.style.opacity = "1";
            n.style.padding = "15px 20px";
            n.style.borderRadius = "10px";
            n.style.marginBottom = "10px";
            n.style.color = "#fff";
            n.style.fontWeight = "bold";
            n.style.background = type === 'error' ? '#f44336' : (type === 'warn' ? '#ff9800' : '#4CAF50');
            n.innerText = msg;
            container.appendChild(n);
            setTimeout(() => { n.style.opacity = '0'; setTimeout(() => n.remove(), 500); }, 3500);
        }

        db.ref("impostazioni/displayClienteAbilitato").on("value", snap => {
            monitorAbilitato = snap.val() ?? true;
            if (!monitorAbilitato) mostraSezione("disabledDiv");
            else refreshStatus(auth.currentUser);
        });

        // ================= MOTORE TEMI UNIVERSALE =================
        let temaManualeDB = "default"; let temiStagionaliDB = false; let modalitaNotteDB = false;
        function getStagioneCorrente() { const m = new Date().getMonth() + 1; const g = new Date().getDate(); if ((m === 3 && g >= 21) || m === 4 || m === 5 || (m === 6 && g <= 20)) return "primavera"; if ((m === 6 && g >= 21) || m === 7 || m === 8 || (m === 9 && g <= 22)) return "estate"; if ((m === 9 && g >= 23) || m === 10 || m === 11 || (m === 12 && g <= 20)) return "autunno"; return "inverno"; }
        function valutaEApplicaTemaFinale() {
            let t = temaManualeDB;
            if (temiStagionaliDB) t = getStagioneCorrente();
            if (modalitaNotteDB) { const o = new Date().getHours(); if (o >= 21 || o < 5) t = "notte"; }
            document.body.className = document.body.className.replace(/\btema-\S+/g, ''); document.body.classList.add("tema-" + t); document.body.classList.add("tema-caricato");
            const bg = document.getElementById("themeBackground"); if (bg) bg.style.display = "block";
        }
        db.ref("impostazioni/tema").on("value", s => { temaManualeDB = s.val() || "default"; valutaEApplicaTemaFinale(); });
        db.ref("impostazioni/temiStagionaliAttivi").on("value", s => { temiStagionaliDB = s.val() === true; valutaEApplicaTemaFinale(); });
        db.ref("impostazioni/modalitaNotte").on("value", s => { modalitaNotteDB = s.val() === true; valutaEApplicaTemaFinale(); });
        setInterval(valutaEApplicaTemaFinale, 60000);
        // ==========================================================

        function monitoraCasse() {
            if (utentiListener) return;
            utentiListener = db.ref("utenti").on("value", snap => {
                const sel = document.getElementById("selectCassa");
                if (!sel) return;
                const currentSelection = sel.value;
                sel.innerHTML = '<option value="">-- Seleziona Postazione --</option>';
                
                snap.forEach(u => {
                    const d = u.val();
                    const isOnline = d.status && d.status.state === 'online';
                    if ((d.ruolo === 'cassa' || d.ruolo === 'admin') && d.approvato && isOnline) {
                        let opt = document.createElement("option");
                        opt.value = u.key; opt.textContent = d.username;
                        sel.appendChild(opt);

                        if (!onlineKnown.has(u.key)) {
                            if (!isFirstLoadCasse) notify(`La cassa "${d.username}" è ora ONLINE`, "success");
                            onlineKnown.add(u.key);
                        }
                    } else {
                        onlineKnown.delete(u.key);
                    }
                });
                sel.value = currentSelection;
                isFirstLoadCasse = false;
            });
        }

        function refreshStatus(user) {
            if (!monitorAbilitato) return;
            if (sessionStorage.getItem("logout_manuale_cliente") === "true") {
                mostraSezione("loginDiv");
                return;
            }
            if (user) {
                db.ref("utenti/" + user.uid).once("value", snap => {
                    const userData = snap.val();
                    if (user.email === "cliente@bistrobo.it" || (userData && userData.approvato)) {
                        document.getElementById("btnLogout").style.display = "block";
                        const cassaSalvata = localStorage.getItem("cassaMonitorata");
                        if (cassaSalvata) avviaMonitor(cassaSalvata);
                        else {
                            mostraSezione("cassaDiv");
                            monitoraCasse();
                        }
                    } else {
                        auth.signOut();
                        mostraSezione("loginDiv");
                    }
                });
            } else {
                mostraSezione("loginDiv");
            }
        }

        auth.onAuthStateChanged(user => refreshStatus(user));

        function login() {
            const e = document.getElementById("email").value.trim();
            const p = document.getElementById("pass").value;
            auth.signInWithEmailAndPassword(e, p).then(() => {
                sessionStorage.removeItem("logout_manuale_cliente");
            }).catch(() => notify("Credenziali errate", "error"));
        }

        function connettiCassa() {
            const uid = document.getElementById("selectCassa").value;
            if(!uid) return notify("Seleziona una postazione!", "warn");
            localStorage.setItem("cassaMonitorata", uid);
            avviaMonitor(uid);
        }

        // ==========================================
        // MOTORE DI RENDERING (COPIA 1:1 DELLA CASSA)
        // ==========================================
        function avviaMonitor(uidCassa) {
            if (!monitorAbilitato) return;
            mostraSezione("displayScreen");
            document.getElementById("btnSwitch").style.display = "block";
            
            db.ref("displayLive/" + uidCassa).on("value", snap => {
                const data = snap.val();
                if(!data || !data.piatti || data.piatti.length === 0) {
                    resetGrafica();
                    return;
                }
                
                document.getElementById("labelCassa").innerText = "(Collegato)";
                document.getElementById("vTotale").innerText = "€ " + data.totale.toFixed(2);
                document.getElementById("vPagato").innerText = "€ " + (data.pagato || 0).toFixed(2);
                document.getElementById("vResto").innerText = "€ " + (data.resto || 0).toFixed(2);
                
                let htmlComanda = "";
                
                // Assicuriamoci che i piatti siano un Array per iterarli
                const piattiArray = Array.isArray(data.piatti) ? data.piatti : Object.values(data.piatti);
                
                piattiArray.forEach(p => {
                    let testoVarianti = "";
                    
                    // 1. GESTIONE VARIANTI (Aggiunte e Rimozioni)
                    let variantiArray = p.varianti ? (Array.isArray(p.varianti) ? p.varianti : Object.values(p.varianti)) : [];
                    
                    if (variantiArray.length > 0) {
                        let conteggio = {};
                        variantiArray.forEach(v => {
                            if (!v || !v.tipo) return;
                            let key = v.tipo + "_" + v.nome;
                            if (!conteggio[key]) conteggio[key] = { tipo: v.tipo, nome: v.nome, count: 0 };
                            conteggio[key].count++; // Nella cassa usa count++ iterando gli oggetti sparsi
                        });
                        
                        let mapVarianti = Object.values(conteggio).map(v => {
                            let qTxt = v.count > 1 ? `${v.count}x ` : "";
                            let nomeExtra = v.nome.charAt(0).toUpperCase() + v.nome.slice(1);
                            if (v.tipo === "aggiunta") return `<span style="color:#4CAF50">+ ${qTxt}${nomeExtra}</span>`;
                            else return `<span style="color:#F44336">- Senza ${nomeExtra}</span>`;
                        }).join("<br>");
                        
                        testoVarianti += `<div style="font-size: 0.75em; margin-top: 5px; line-height: 1.4;">${mapVarianti}</div>`;
                    }
                
                    // 2. GESTIONE CONTORNI E LORO VARIANTI
                    let contorniArray = p.contorniScelti ? (Array.isArray(p.contorniScelti) ? p.contorniScelti : Object.values(p.contorniScelti)) : [];
                    
                    if (contorniArray.length > 0) {
                        const cTxt = contorniArray.map((c) => {
                            let varsTxt = "";
                            let cVarArray = c.varianti ? (Array.isArray(c.varianti) ? c.varianti : Object.values(c.varianti)) : [];
                            
                            if (cVarArray.length > 0) {
                                let conteggioC = {};
                                cVarArray.forEach(v => {
                                    if (!v || !v.tipo) return;
                                    let keyC = v.tipo + "_" + v.nome;
                                    if (!conteggioC[keyC]) conteggioC[keyC] = { tipo: v.tipo, nome: v.nome, count: 0 };
                                    conteggioC[keyC].count++;
                                });
                                let stringaVarianti = Object.values(conteggioC).map(v => {
                                    let qTxt = v.count > 1 ? `${v.count}x ` : "";
                                    let nomeExtra = v.nome.charAt(0).toUpperCase() + v.nome.slice(1);
                                    return v.tipo === 'aggiunta' ? `+${qTxt}${nomeExtra}` : `-${nomeExtra}`;
                                }).join(", ");
                                varsTxt = ` <span style='color:#777; font-weight:normal;'>(${stringaVarianti})</span>`;
                            }
                            
                            return c.isGratis 
                                ? `<span style="color:#4CAF50;">↳ ${c.nome} (Incluso)${varsTxt}</span>` 
                                : `<span style="color:#2196F3;">↳ ${c.nome} (+€${(c.prezzoPagato || 0).toFixed(2)})${varsTxt}</span>`;
                        }).join("<br>");
                        
                        testoVarianti += `<div style="font-size: 0.75em; margin-top: 5px; line-height: 1.4;">${cTxt}</div>`;
                    }

                    // 3. CALCOLO PREZZO (Uguale a carrello cassa)
                    let prezzoSingoloScontato = p.prezzo || 0;
                    if (p.sconto && p.sconto.tipo === "percentuale") {
                        prezzoSingoloScontato = prezzoSingoloScontato * (1 - (p.sconto.valore / 100));
                    }
                    const prezzoTotalePiatto = (prezzoSingoloScontato + (p.extraPrezzo || 0)) * (p.quantita || 1);
                
                    // 4. STRUTTURA FINALE
                    htmlComanda += `
                    <div class="riga-ordine" style="display: flex; flex-direction: column; padding: 18px 0; border-bottom: 1px dashed rgba(128,128,128,0.3); font-size: 1.1em;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: flex-start;">
                            <div style="text-align: left;">
                                <b style="color:#00bcd4; font-weight: 900; margin-right: 8px;">${p.quantita}x</b> 
                                <span style="font-weight: 800;">${p.nome}</span> 
                            </div>
                            <div style="font-weight: bold; white-space: nowrap; margin-left: 15px;">
                                €${prezzoTotalePiatto.toFixed(2)}
                            </div>
                        </div>
                        <div style="padding-left: 45px; font-weight: 800;">
                            ${testoVarianti}
                        </div>
                    </div>
                    `;
                });

                document.getElementById("areaLista").innerHTML = htmlComanda;
            });

            db.ref("utenti/" + uidCassa + "/status/state").on("value", stateSnap => {
                if (stateSnap.val() === "offline") {
                    notify("Postazione disconnessa dal cassiere.", "warn");
                    interrompiMonitoraggio(uidCassa);
                }
            });
        }

        function interrompiMonitoraggio(uidCassa) {
            db.ref("displayLive/" + uidCassa).off();
            db.ref("utenti/" + uidCassa + "/status/state").off();
            localStorage.removeItem("cassaMonitorata");
            resetGrafica();
            document.getElementById("btnSwitch").style.display = "none";
            mostraSezione("cassaDiv");
            monitoraCasse();
        }

        function cambiaCassa() {
            const uid = localStorage.getItem("cassaMonitorata");
            if(uid) interrompiMonitoraggio(uid);
        }

        function resetGrafica() {
            document.getElementById("vTotale").innerText = "€ 0.00";
            document.getElementById("vPagato").innerText = "€ 0.00";
            document.getElementById("vResto").innerText = "€ 0.00";
            document.getElementById("areaLista").innerHTML = '<div style="text-align:center; margin-top:150px; opacity:0.15; font-size: 2.5em; font-weight: 800;">IN ATTESA DI ARTICOLI...</div>';
        }

        function mostraSezione(id) {
            ["loginDiv", "cassaDiv", "displayScreen", "disabledDiv"].forEach(d => document.getElementById(d).style.display = "none");
            const el = document.getElementById(id);
            if(el) el.style.display = "flex";
        }

        function eseguiLogout() {
            const uid = localStorage.getItem("cassaMonitorata");
            if(uid) interrompiMonitoraggio(uid);
            const user = auth.currentUser;
            if (user && user.email !== "cliente@bistrobo.it") {
                sessionStorage.setItem("logout_manuale_cliente", "true");
                location.reload();
            } else {
                auth.signOut().then(() => location.reload());
            }
        }
        
        // =============================================================
        // ASCOLTO TOGGLE SOLDI PER SCHERMO CLIENTE
        // =============================================================
        db.ref("impostazioni/gestioneSoldiCassa").on("value", snap => {
            const mostraSoldi = snap.val() ?? true;
            
            const boxPagato = document.getElementById("boxPagatoCliente");
            const boxResto = document.getElementById("boxRestoCliente");
            const footerMonitor = document.getElementById("footerMonitorCliente");
            const boxTotale = document.getElementById("boxTotaleCliente");
        
            if (mostraSoldi) {
                if (boxPagato) boxPagato.style.display = "block";
                if (boxResto) boxResto.style.display = "block";
                if (footerMonitor) footerMonitor.style.gridTemplateColumns = "1fr 1fr 1.5fr";
                if (boxTotale) boxTotale.style.textAlign = "right";
            } else {
                if (boxPagato) boxPagato.style.display = "none";
                if (boxResto) boxResto.style.display = "none";
                if (footerMonitor) footerMonitor.style.gridTemplateColumns = "1fr";
                if (boxTotale) boxTotale.style.textAlign = "center";
            }
        });
    </script>
</body>
</html>
