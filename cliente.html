<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="main/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        /* CRITICO: Impedisce lo schermo bianco prima del caricamento */
        :root {
            --bg-color: #121212; /* Default scuro per evitare flash bianchi */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color) !important;
            color: var(--text-color) !important;
            margin: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #loaderArea {
            position: fixed; inset: 0; 
            background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .schermo-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            width: 95%;
        }

        /* Banner Connessione (come nel sito principale) */
        #offlineBanner {
            background: #d32f2f; color: white; text-align: center; padding: 10px;
            font-weight: bold; display: none;
        }

        .piatto-riga {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px dashed var(--border-color);
            font-size: 1.8em;
        }

        .totali-grid {
            display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 15px;
        }

        .card-totale {
            background: var(--element-bg); padding: 20px; border-radius: 12px;
            text-align: center; border: 1px solid var(--border-color);
        }

        .big-val { font-size: 3em; font-weight: bold; }
    </style>
</head>
<body class="dark-mode"> <div id="offlineBanner">⚠️ CONNESSIONE ASSENTE - Riconnessione...</div>

    <div id="loaderArea">
        <img src="icon-192.png" alt="Logo" style="width: 100px; animation: pulse 1.5s infinite;">
        <h2 id="loaderStatus">Inizializzazione BistroBò...</h2>
    </div>

    <div class="topBar" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 25px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="icon-192.png" alt="Logo" style="width: 40px;">
            <h1 style="margin: 0; font-size: 1.6em;">ORDINE: <span id="viewNum">---</span></h1>
        </div>
        <button id="logoutBtn" onclick="auth.signOut().then(() => location.reload())" style="display:none; background:transparent; color:var(--text-color); border:1px solid var(--border-color); padding:5px 15px; border-radius:5px;">Esci</button>
    </div>

    <div class="schermo-container">
        
        <div id="loginDiv" style="display:none; max-width: 400px; margin: 50px auto; background: var(--element-bg); padding: 30px; border-radius: 15px; text-align: center;">
            <h2>Accesso Display</h2>
            <input type="email" id="email" placeholder="cliente@bistrobo.it" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1fr solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1fr solid var(--border-color); background:var(--bg-color); color:var(--text-color);">
            <button onclick="eseguiLogin()" style="width:100%; padding:15px; background:var(--primary-color); color:white; border:none; border-radius:8px; font-weight:bold;">ACCEDI</button>
        </div>

        <div id="cassaDiv" style="display:none; max-width: 400px; margin: 50px auto; background: var(--element-bg); padding: 30px; border-radius: 15px; text-align: center;">
            <h2>Configura Canale</h2>
            <p>Seleziona il cassiere da seguire:</p>
            <select id="selectCassa" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; background:var(--bg-color); color:var(--text-color);"></select>
            <button onclick="avviaDisplay()" style="width:100%; padding:15px; background:#4caf50; color:white; border:none; border-radius:8px; font-weight:bold;">CONNETTI</button>
        </div>

        <div id="displayScreen" style="display:none; flex-direction: column; gap: 20px; flex: 1;">
            
            <div id="viewLista" style="background: var(--element-bg); border-radius: 15px; padding: 20px; flex: 1; overflow-y: auto; border: 1px solid var(--border-color);">
                <div style="text-align:center; margin-top:100px; opacity:0.3; font-size: 2em;">In attesa di articoli...</div>
            </div>

            <div class="totali-grid">
                <div class="card-totale">
                    <div style="opacity:0.6; text-transform:uppercase;">Pagato</div>
                    <div class="big-val" style="color: #2196f3;" id="viewPagato">€ 0.00</div>
                </div>
                <div class="card-totale">
                    <div style="opacity:0.6; text-transform:uppercase;">Resto</div>
                    <div class="big-val" style="color: #4caf50;" id="viewResto">€ 0.00</div>
                </div>
                <div class="card-totale" style="border: 2px solid var(--primary-color);">
                    <div style="color: var(--primary-color); font-weight:bold; text-transform:uppercase;">Totale Dovuto</div>
                    <div class="big-val" id="viewTotale">€ 0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // 1. SINCRONIZZAZIONE TEMA (Identica a preordini.js)
        db.ref("impostazioni").on("value", snap => {
            const imp = snap.val() || {};
            if (imp.tema) {
                document.documentElement.setAttribute('data-theme', imp.tema);
                document.body.className = imp.tema;
            }
            if (imp.colori) {
                for (let k in imp.colori) {
                    document.documentElement.style.setProperty(`--${k}`, imp.colori[k]);
                }
            }
            // Nasconde il loader solo quando il tema è caricato
            setTimeout(() => {
                document.getElementById("loaderArea").style.opacity = "0";
                setTimeout(() => document.getElementById("loaderArea").style.display = "none", 500);
            }, 800);
        });

        // 2. STATO CONNESSIONE
        db.ref(".info/connected").on("value", snap => {
            document.getElementById("offlineBanner").style.display = snap.val() ? "none" : "block";
        });

        // 3. LOGICA ACCESSO
        auth.onAuthStateChanged(user => {
            if (user && user.email === "cliente@bistrobo.it") {
                document.getElementById("logoutBtn").style.display = "block";
                caricaCasse();
            } else {
                if (user) auth.signOut();
                mostraSchermata("loginDiv");
            }
        });

        function mostraSchermata(id) {
            document.getElementById("loginDiv").style.display = "none";
            document.getElementById("cassaDiv").style.display = "none";
            document.getElementById("displayScreen").style.display = "none";
            document.getElementById(id).style.display = (id === "displayScreen") ? "flex" : "block";
        }

        function eseguiLogin() {
            const e = document.getElementById("email").value.trim();
            const p = document.getElementById("pass").value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Email o password errati"));
        }

        function caricaCasse() {
            mostraSchermata("cassaDiv");
            db.ref("utenti").once("value", snap => {
                const sel = document.getElementById("selectCassa");
                sel.innerHTML = '<option value="">-- Seleziona la Cassa --</option>';
                snap.forEach(s => {
                    const u = s.val();
                    if (u.ruolo === 'cassa' || u.ruolo === 'admin') {
                        let opt = document.createElement("option");
                        opt.value = s.key; opt.textContent = u.username || u.email;
                        sel.appendChild(opt);
                    }
                });
            });
        }

        function avviaDisplay() {
            const uid = document.getElementById("selectCassa").value;
            if (!uid) return;
            mostraSchermata("displayScreen");
            
            db.ref("displayLive/" + uid).on("value", snap => {
                const d = snap.val();
                if (!d || !d.piatti || d.piatti.length === 0) {
                    puliziaDisplay();
                    return;
                }
                
                document.getElementById("viewNum").innerText = d.numeroComanda || "---";
                document.getElementById("viewTotale").innerText = "€ " + d.totale.toFixed(2);
                document.getElementById("viewPagato").innerText = "€ " + (d.pagato || 0).toFixed(2);
                document.getElementById("viewResto").innerText = "€ " + (d.resto || 0).toFixed(2);
                
                document.getElementById("viewLista").innerHTML = d.piatti.map(p => `
                    <div class="piatto-riga">
                        <span><b style="color:var(--primary-color)">${p.quantita}x</b> ${p.nome}</span>
                        <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                    </div>
                `).join("");
            });
        }

        function puliziaDisplay() {
            document.getElementById("viewNum").innerText = "---";
            document.getElementById("viewTotale").innerText = "€ 0.00";
            document.getElementById("viewPagato").innerText = "€ 0.00";
            document.getElementById("viewResto").innerText = "€ 0.00";
            document.getElementById("viewLista").innerHTML = '<div style="text-align:center; margin-top:100px; opacity:0.3; font-size: 2em;">In attesa di articoli...</div>';
        }
    </script>
</body>
</html>
