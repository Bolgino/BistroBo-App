<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Schermo Cliente</title>
    
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="main/style.css">
    
    <style>
        /* Overlay specifico per il Display Cliente per massimizzare la visibilità */
        body { display: flex !important; visibility: visible !important; opacity: 1 !important; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        .display-main { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; box-sizing: border-box; }
        .order-container { flex: 1; background: var(--bg-element); border-radius: 15px; padding: 25px; overflow-y: auto; border: 2px solid var(--border-color); box-shadow: var(--shadow); }
        
        .piatto-row { display: flex; justify-content: space-between; font-size: 2em; padding: 15px 0; border-bottom: 1px dashed var(--border-color); color: var(--text-color); }
        .piatto-qty { font-weight: bold; color: var(--primary-color); margin-right: 15px; }
        
        .footer-display { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        .stat-card { background: var(--bg-element); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .stat-label { font-size: 1.2em; text-transform: uppercase; opacity: 0.7; margin-bottom: 5px; color: var(--text-color); }
        .stat-value { font-size: 2.5em; font-weight: bold; }
        
        .total-card { border: 3px solid var(--primary-color) !important; background: var(--primary-color) !important; color: white !important; }
        .total-value { font-size: 4em; line-height: 1; }

        #setupArea { position: fixed; inset: 0; background: var(--bg-color); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .setup-box { background: var(--bg-element); padding: 40px; border-radius: 20px; width: 400px; text-align: center; border: 1px solid var(--border-color); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-size: 1.1em; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1.2em; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="tema-default">

    <div id="setupArea">
        <div class="setup-box">
            <img src="icon-192.png" width="80" style="margin-bottom: 20px;">
            <div id="loginForm">
                <h2 style="color: var(--text-color);">Accesso Display</h2>
                <input type="email" id="email" placeholder="cliente@bistrobo.it">
                <input type="password" id="pass" placeholder="Password">
                <button style="background: var(--primary-color); color: white;" onclick="login()">ACCEDI</button>
            </div>
            <div id="cassaSelectArea" style="display:none;">
                <h2 style="color: var(--text-color);">Scegli la Cassa</h2>
                <select id="cassaSelect"></select>
                <button style="background: #4caf50; color: white;" onclick="start()">AVVIA DISPLAY</button>
            </div>
        </div>
    </div>

    <div class="topBar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="icon-192.png" width="40">
            <h1 style="margin:0;">BistroBò - Ordine <span id="viewNum">---</span></h1>
        </div>
        <button onclick="logout()" style="width: auto; background: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 5px 15px;">Esci</button>
    </div>

    <div class="display-main">
        <div class="order-container" id="viewLista">
            <div style="text-align:center; margin-top:100px; font-size: 2em; opacity: 0.4; color: var(--text-color);">
                In attesa di articoli dalla cassa...
            </div>
        </div>

        <div class="footer-display">
            <div class="stat-card">
                <div class="stat-label">Pagato</div>
                <div class="stat-value" style="color: #2196f3;" id="viewPagato">€ 0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Resto</div>
                <div class="stat-value" style="color: #4caf50;" id="viewResto">€ 0.00</div>
            </div>
            <div class="stat-card total-card">
                <div class="stat-label" style="color: white; opacity: 1;">Totale Dovuto</div>
                <div class="stat-value total-value" id="viewTotale">€ 0.00</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- GESTIONE TEMA DINAMICO BISTROBÒ ---
        db.ref("impostazioni").on("value", snap => {
            const imp = snap.val() || {};
            if(imp.tema) {
                document.body.className = ""; // Pulisce classi precedenti
                document.body.classList.add("tema-" + imp.tema);
                document.documentElement.setAttribute('data-theme', (imp.tema === 'default' ? 'light' : 'dark'));
            }
            if(imp.colori) {
                for(let c in imp.colori) document.documentElement.style.setProperty(`--${c}`, imp.colori[c]);
            }
        });

        // --- LOGICA ACCESSO ---
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        auth.onAuthStateChanged(user => {
            if (user && user.email === "cliente@bistrobo.it") {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('cassaSelectArea').style.display = 'block';
                loadCasse();
            } else if (user) {
                auth.signOut();
            }
        });

        function login() {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Errore accesso display"));
        }

        function loadCasse() {
            db.ref("utenti").once("value", snap => {
                const sel = document.getElementById('cassaSelect');
                sel.innerHTML = '<option value="">-- Seleziona la Cassa --</option>';
                snap.forEach(s => {
                    const u = s.val();
                    if(u.ruolo === 'cassa' || u.ruolo === 'admin') {
                        const opt = document.createElement('option');
                        opt.value = s.key; opt.textContent = u.username;
                        sel.appendChild(opt);
                    }
                });
            });
        }

        function start() {
            const uidCassa = document.getElementById('cassaSelect').value;
            if(!uidCassa) return;
            document.getElementById('setupArea').style.display = 'none';

            db.ref("displayLive/" + uidCassa).on("value", snap => {
                const d = snap.val();
                if(!d || !d.piatti || d.piatti.length === 0) {
                    resetDisplay();
                    return;
                }

                document.getElementById("viewNum").innerText = d.numeroComanda || "---";
                document.getElementById("viewTotale").innerText = "€ " + d.totale.toFixed(2);
                document.getElementById("viewPagato").innerText = "€ " + (d.pagato || 0).toFixed(2);
                document.getElementById("viewResto").innerText = "€ " + (d.resto || 0).toFixed(2);
                
                document.getElementById("viewLista").innerHTML = d.piatti.map(p => `
                    <div class="piatto-row">
                        <span><span class="piatto-qty">${p.quantita}x</span> ${p.nome}</span>
                        <span>€ ${(p.prezzo * p.quantita).toFixed(2)}</span>
                    </div>
                `).join("");
            });
        }

        function resetDisplay() {
            document.getElementById("viewNum").innerText = "---";
            document.getElementById("viewTotale").innerText = "€ 0.00";
            document.getElementById("viewPagato").innerText = "€ 0.00";
            document.getElementById("viewResto").innerText = "€ 0.00";
            document.getElementById("viewLista").innerHTML = '<div style="text-align:center; margin-top:100px; font-size: 2em; opacity: 0.4; color: var(--text-color);">In attesa di articoli...</div>';
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
