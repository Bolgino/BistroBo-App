<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroBò - Reimposta Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .lock-bounce { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-orange-500">
        <div class="mb-6">
            <div class="text-6xl lock-bounce mb-2">🔐</div>
            <h1 class="text-3xl font-bold text-orange-500 tracking-tight">BistroBò</h1>
            <p class="text-gray-400 text-sm uppercase tracking-widest">Reimposta Password</p>
        </div>

        <div id="content-pre">
            <h2 class="text-xl font-semibold mb-2 text-white">Hai scordato la ricetta segreta?</h2>
            <p class="text-gray-300 mb-6 text-sm">
                Nessun problema. Inserisci la tua nuova password qui sotto.
            </p>
            
            <div class="space-y-4 mb-6 text-left">
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2" for="newPassword">Nuova Password</label>
                    <input type="password" id="newPassword" placeholder="Minimo 6 caratteri" 
                        class="w-full px-4 py-3 rounded-xl bg-gray-700 text-white border border-gray-600 focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-colors">
                </div>
            </div>

            <button id="btnReset" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 px-8 rounded-2xl transition-all transform hover:scale-105 shadow-lg w-full">
                💾 Salva Nuova Password
            </button>
        </div>

        <div id="status-container" class="hidden">
            <div id="icon-status" class="text-5xl mb-4"></div>
            <p id="messaggio" class="text-lg font-medium px-2"></p>
        </div>
        
        <div class="mt-8 pt-6 border-t border-gray-700">
            <a href="index.html" class="text-orange-400 hover:text-orange-300 font-semibold transition-colors flex items-center justify-center gap-2">
                <span>←</span> Torna al Login di BistroBò
            </a>
        </div>
    </div>

    <script>
        // --- INSERISCI QUI LA TUA CONFIGURAZIONE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDxpd24nF3qmNrh8j40jxjhYzh1RC08DhI",
            authDomain: "comande-6fb85.firebaseapp.com",
            databaseURL: "https://comande-6fb85-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "comande-6fb85",
            storageBucket: "comande-6fb85.firebasestorage.app",
            messagingSenderId: "676960522709",
            appId: "1:676960522709:web:cc2284c87e73044f566d5c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        const btnReset = document.getElementById('btnReset');
        const newPasswordInput = document.getElementById('newPassword');
        const contentPre = document.getElementById('content-pre');
        const statusContainer = document.getElementById('status-container');
        const messaggio = document.getElementById('messaggio');
        const iconStatus = document.getElementById('icon-status');

        btnReset.addEventListener('click', async () => {
            if(!actionCode) {
                showStatus("❌", "Codice non trovato. Usa il link inviato via email.", "text-red-400");
                return;
            }

            const newPassword = newPasswordInput.value;

            if(newPassword.length < 6) {
                alert("La password deve essere lunga almeno 6 caratteri!");
                return;
            }

            try {
                btnReset.disabled = true;
                btnReset.innerText = "Salvataggio...";

                // Applica la nuova password su Firebase
                await auth.confirmPasswordReset(actionCode, newPassword);
                
                showStatus("✅", "Ricetta salvata! La tua password è stata aggiornata con successo.", "text-green-400");

            } catch (error) {
                console.error(error);
                showStatus("⚠️", "Questo link è scaduto o non è valido. Richiedi un nuovo reset dal login.", "text-yellow-400");
            }
        });

        function showStatus(icon, text, colorClass) {
            contentPre.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            iconStatus.innerText = icon;
            messaggio.innerText = text;
            messaggio.className = "text-lg font-medium mt-2 " + colorClass;
        }
    </script>
</body>
</html>
